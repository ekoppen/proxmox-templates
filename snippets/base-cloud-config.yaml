#cloud-config

# ============================================
# BASE CLOUD-INIT CONFIG
# Gemeenschappelijke configuratie voor alle VMs
# ============================================

package_update: true
package_upgrade: true

packages:
  - qemu-guest-agent
  - net-tools
  - curl
  - wget
  - vim
  - sudo
  - openssh-server
  - htop
  - unattended-upgrades

ssh_pwauth: false

users:
  - name: admin
    groups: sudo, adm
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    lock_passwd: true
    ssh_authorized_keys:
      - YOUR_SSH_PUBLIC_KEY_HERE

runcmd:
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  - systemctl enable ssh
  - systemctl start ssh

  # Hostname: set from Proxmox VM name via cloud-init metadata
  - |
    NEW_HOSTNAME=$(cloud-init query local-hostname 2>/dev/null || true)
    if [ -n "$NEW_HOSTNAME" ] && [ "$NEW_HOSTNAME" != "localhost" ]; then
      hostnamectl set-hostname "$NEW_HOSTNAME"
    fi

  # Deploy key → root (configured by setup.sh)
  - |
    DKEY="DEPLOY_SSH_PUBLIC_KEY_HERE"
    if echo "$DKEY" | grep -q "^ssh-"; then
      mkdir -p /root/.ssh && chmod 700 /root/.ssh
      echo "$DKEY" >> /root/.ssh/authorized_keys
      chmod 600 /root/.ssh/authorized_keys
    fi

  # MOTD met toegangsinformatie
  - |
    IP=$(hostname -I | awk '{print $1}')
    cat > /etc/motd << EOF

    ╔══════════════════════════════════════════╗
    ║  Base Server                             ║
    ╠══════════════════════════════════════════╣
    ║  SSH:  ssh admin@${IP}                   ║
    ╚══════════════════════════════════════════╝

    EOF

# Automatische security updates
write_files:
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

final_message: "Cloud-init base setup voltooid na $UPTIME seconden"
